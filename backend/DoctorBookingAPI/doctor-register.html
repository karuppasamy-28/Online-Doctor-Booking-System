<!DOCTYPE html>
<html>
<head>
    <title>Doctor Register</title>
    <link rel="stylesheet" href="doctor-register.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Doctor Registration</h2>

        <input id="name" placeholder="Full Name">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <input id="specialization" placeholder="Specialization">
        <input id="experience" type="number" placeholder="Experience (years)">
        <input id="fees" type="number" placeholder="Consultation Fees">
        <input id="imageUrl" placeholder="Profile Image URL">

        <button onclick="doctorRegister()">Register</button>

        <p class="login-link">
            Already registered? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
